<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🌡️ Temperature Converter</h1>
        <form method="POST">
            <input type="number" name="temperature" step="any" placeholder="Enter temperature" required>

            <select name="conversion" required>
                <option value="CtoF">Celsius → Fahrenheit</option>
                <option value="FtoC">Fahrenheit → Celsius</option>
                <option value="CtoK">Celsius → Kelvin</option>
                <option value="KtoC">Kelvin → Celsius</option>
                <option value="FtoK">Fahrenheit → Kelvin</option>
                <option value="KtoF">Kelvin → Fahrenheit</option>
            </select>

            <button type="submit">Convert</button>
        </form>

        {% if result is not none %}
            <div class="result">
                {% if result == "Invalid input! Please enter a number." %}
                    <p class="error">{{ result }}</p>
                {% else %}
                    <p>Converted Temperature: <strong>{{ result }}</strong></p>
                {% endif %}
            </div>
        {% endif %}
    </div>
</body>
</html>
